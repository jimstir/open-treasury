version: '3.8'

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    ports:
      - "4000:4000"
    volumes:
      - ./lib/api-server:/app/lib/api-server
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/treasury?schema=public
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - treasury-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=treasury
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d treasury"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - treasury-network

  # Adminer - Database management UI (optional)
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - treasury-network

networks:
  treasury-network:
    driver: bridge

volumes:
  postgres_data:
