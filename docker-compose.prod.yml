version: '3.8'

services:
  # API Server (Production)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: production
    restart: always
    ports:
      - "${PORT}:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-treasury}?schema=public
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - treasury-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database (Production)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-treasury}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-treasury}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - treasury-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  treasury-network:
    driver: bridge

volumes:
  postgres_data:
